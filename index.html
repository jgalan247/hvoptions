<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HV Year 8 Options Guide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; height: 100vh; display: flex; flex-direction: column; }

    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .msg-anim { animation: fadeIn 0.2s ease; }

    /* Header */
    .header { background: #1a2b4a; padding: 14px 20px; display: flex; align-items: center; gap: 14; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .header-logo { width: 42px; height: 42px; background: #e8a020; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 17px; color: #1a2b4a; flex-shrink: 0; }
    .header-title { color: white; font-weight: 600; font-size: 16px; }
    .header-sub { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 1px; }
    .header-dot { display: inline-block; width: 7px; height: 7px; background: #4ade80; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

    /* Chips */
    .chips { background: white; border-bottom: 1px solid #e2e8f0; padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    .chip { background: #e6f4f2; color: #0d7a6e; border: 1px solid rgba(13,122,110,0.2); border-radius: 20px; padding: 5px 13px; font-size: 12.5px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; font-family: inherit; }
    .chip:hover { background: #0d7a6e; color: white; }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg-user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-assistant { align-self: flex-start; }

    .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; margin-top: 2px; }
    .avatar-user { background: #e8a020; color: #1a2b4a; }
    .avatar-assistant { background: #1a2b4a; color: #e8a020; }

    .bubble { padding: 11px 15px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); font-size: 14.5px; line-height: 1.6; }
    .bubble-user { background: #1a2b4a; color: white; border-radius: 16px 4px 16px 16px; }
    .bubble-assistant { background: white; color: #1e2d3d; border-radius: 4px 16px 16px 16px; border: 1px solid #e2e8f0; }
    .bubble p { margin: 4px 0; }
    .bubble ul { padding-left: 18px; margin: 6px 0; }
    .bubble li { margin-bottom: 3px; }

    .senco-banner { background: #fdf3e0; border: 1px solid rgba(232,160,32,0.3); border-radius: 8px; padding: 7px 11px; font-size: 12px; color: #7a5010; margin-top: 10px; }

    /* Typing dots */
    .typing-dots { display: flex; gap: 5px; padding: 4px 2px; }
    .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* Input */
    .input-bar { background: white; border-top: 1px solid #e2e8f0; padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    .input-bar textarea { flex: 1; border: 1.5px solid #dde3ec; border-radius: 12px; padding: 10px 14px; font-size: 14.5px; font-family: inherit; resize: none; max-height: 120px; line-height: 1.5; color: #1e2d3d; transition: border-color 0.2s; }
    .input-bar textarea:focus { outline: none; border-color: #0d7a6e; }
    .send-btn { width: 42px; height: 42px; border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
    .send-btn:disabled { background: #e2e8f0; cursor: not-allowed; }
    .send-btn:not(:disabled) { background: #1a2b4a; }

    .footer { text-align: center; font-size: 11px; color: #94a3b8; padding: 5px 0 8px; background: white; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">HV</div>
    <div>
      <div class="header-title">Year 8 Options Guide</div>
      <div class="header-sub"><span class="header-dot"></span>Haute Vall&eacute;e School &middot; 2025&ndash;2027</div>
    </div>
  </div>

  <!-- Quick-question chips -->
  <div class="chips" id="chips"></div>

  <!-- Chat messages -->
  <div class="messages" id="messages"></div>

  <!-- Input bar -->
  <div class="input-bar">
    <textarea id="input" rows="1" placeholder="Ask anything about GCSE options&hellip;"></textarea>
    <button class="send-btn" id="sendBtn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24"><path id="sendIcon" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="#94a3b8"/></svg>
    </button>
  </div>
  <div class="footer">Based on the HV Options Booklet 2025 &middot; Always confirm decisions with the school</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────
  // Update this to your Cloudflare Worker URL after deploying
  const WORKER_URL = 'https://hv-options-chat.YOUR-SUBDOMAIN.workers.dev/chat';

  const SENSITIVE_RE = /dyslexia|autism|autistic|adhd|sen\b|special needs|learning diff|disability|support|change|withdraw/i;

  const CHIPS = [
    'What subjects are available?',
    'How do I choose my options?',
    'What is the EBacc?',
    'Can I change my mind later?',
    'My child is dyslexic – which subjects suit them?',
    'Difference between GCSE and BTEC?',
    'Tell me about Computer Science',
    'Which subjects have no written exams?',
    'What are the core subjects?',
    'Tell me about the Highlands College courses',
  ];

  // ── STATE ───────────────────────────────────────────────────────
  const history = [];        // conversation history sent to worker
  let loading = false;

  // ── DOM REFS ────────────────────────────────────────────────────
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const sendIcon   = document.getElementById('sendIcon');
  const chipsEl    = document.getElementById('chips');

  // ── RENDER CHIPS ────────────────────────────────────────────────
  CHIPS.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = text;
    btn.addEventListener('click', () => send(text));
    chipsEl.appendChild(btn);
  });

  // ── WELCOME MESSAGE ─────────────────────────────────────────────
  addMessage('assistant', '\u{1F44B} Hi! I\'m the **Haute Vall\u00e9e Year 8 Options Guide**.\n\nI can help you and your child understand the GCSE subjects on offer for 2025\u20132027 \u2014 what they involve, how they\'re assessed, and which might be the right fit.\n\nWhat would you like to know? Use the quick questions below or just ask me anything.');

  // ── INPUT HANDLING ──────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    updateSendBtn();
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(inputEl.value); }
  });

  sendBtn.addEventListener('click', () => send(inputEl.value));

  function updateSendBtn() {
    const empty = !inputEl.value.trim();
    sendBtn.disabled = loading || empty;
    sendIcon.setAttribute('fill', (loading || empty) ? '#94a3b8' : 'white');
  }

  // ── SEND MESSAGE ────────────────────────────────────────────────
  async function send(text) {
    const trimmed = text.trim();
    if (!trimmed || loading) return;

    // Show user message
    addMessage('user', trimmed);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    loading = true;
    updateSendBtn();

    // Add to history
    history.push({ role: 'user', content: trimmed });

    // Show typing indicator
    const typingEl = showTyping();

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        const errDetail = data.error || 'Something went wrong';
        removeTyping(typingEl);
        addMessage('assistant', '\u26A0\uFE0F ' + errDetail);
        loading = false;
        updateSendBtn();
        return;
      }

      const reply = (data.content && data.content[0] && data.content[0].text) || 'Sorry, I couldn\'t get a response. Please try again.';

      // Add to history
      history.push({ role: 'assistant', content: reply });

      removeTyping(typingEl);
      addMessage('assistant', reply, SENSITIVE_RE.test(trimmed));

    } catch (e) {
      removeTyping(typingEl);
      addMessage('assistant', '\u26A0\uFE0F Error: ' + e.message);
    }

    loading = false;
    updateSendBtn();
  }

  // ── DOM HELPERS ─────────────────────────────────────────────────
  function addMessage(role, text, sensitive) {
    const row = document.createElement('div');
    row.className = 'msg msg-anim msg-' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar avatar-' + role;
    avatar.textContent = role === 'user' ? 'You' : 'HV';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bubble-' + role;
    bubble.innerHTML = parseMarkdown(text);

    if (sensitive) {
      const banner = document.createElement('div');
      banner.className = 'senco-banner';
      banner.textContent = '\u26A0\uFE0F For your child\'s specific needs, always speak to the school\'s SENCO directly.';
      bubble.appendChild(banner);
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg msg-anim msg-assistant';
    row.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar avatar-assistant';
    avatar.textContent = 'HV';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bubble-assistant';
    bubble.innerHTML = '<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  function removeTyping(el) {
    if (el && el.parentNode) el.parentNode.removeChild(el);
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── MARKDOWN PARSER ─────────────────────────────────────────────
  function parseMarkdown(text) {
    const lines = text.split('\n');
    let html = '';
    let inList = false;

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) {
        if (inList) { html += '</ul>'; inList = false; }
        continue;
      }
      if (trimmed.startsWith('- ') || trimmed.startsWith('\u2022 ')) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + renderInline(trimmed.replace(/^[-\u2022]\s/, '')) + '</li>';
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        html += '<p>' + renderInline(trimmed) + '</p>';
      }
    }
    if (inList) html += '</ul>';
    return html;
  }

  function renderInline(text) {
    return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  }
</script>
</body>
</html>
